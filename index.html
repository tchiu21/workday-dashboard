<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workday Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lockScreen" class="lock-screen">
        <form id="lockForm" class="lock-form">
            <h1 class="lock-title">Workday Dashboard</h1>
            <label for="lockInput" class="lock-label">Enter passphrase</label>
            <input id="lockInput" type="password" class="lock-input" autocomplete="off" autofocus>
            <button type="submit" class="lock-submit">Unlock</button>
            <div id="lockError" class="lock-error" role="alert"></div>
        </form>
    </div>

    <div id="appContainer" hidden>
    <header>
        <div class="header-content">
            <h1>Workday Dashboard</h1>
            <div class="last-updated" id="lastUpdated"></div>
        </div>
        <nav class="date-nav">
            <button id="prevDay" class="nav-button" aria-label="Previous day">&larr;</button>
            <div class="current-date" id="currentDate"></div>
            <button id="nextDay" class="nav-button" aria-label="Next day">&rarr;</button>
        </nav>
    </header>

    <main>
        <div id="loading" class="loading">Loading...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="warningsBanner" class="warnings-banner" style="display: none;"></div>
        <div id="dashboard" class="dashboard" style="display: none;">
            <section class="section standup-digest" id="standupDigest" style="display: none;">
                <h2 class="section-label digest-label">Standup Digest</h2>
                <div class="digest-group">
                    <h3 class="digest-subhead">Yesterday</h3>
                    <ul id="digestYesterday" class="digest-list"></ul>
                </div>
                <div class="digest-group">
                    <h3 class="digest-subhead">Today</h3>
                    <ul id="digestToday" class="digest-list"></ul>
                </div>
                <div class="digest-group">
                    <h3 class="digest-subhead">Blockers &amp; Attention</h3>
                    <ul id="digestBlockers" class="digest-list"></ul>
                </div>
            </section>

            <section class="section">
                <h2 class="section-label done-label">Done</h2>
                <div id="doneItems" class="pill-container"></div>
            </section>

            <section class="section">
                <h2 class="section-label in-progress-label">In Progress</h2>
                <div id="inProgressItems" class="pill-container"></div>
            </section>

            <section class="section">
                <h2 class="section-label up-next-label">Up Next</h2>
                <div id="upNextItems" class="pill-container"></div>
            </section>

            <section class="section">
                <h2 class="section-label slack-label">Slack Attention</h2>
                <div id="slackItems" class="pill-container"></div>
            </section>

            <section class="section">
                <h2 class="section-label slack-work-label">Slack Work (not in Jira/GH)</h2>
                <div id="slackWorkItems" class="pill-container"></div>
            </section>
        </div>
    </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
